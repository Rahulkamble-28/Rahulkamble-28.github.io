<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiah's Interiors</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f6f3;
      color: #1a1a1a;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      position: fixed;
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 1px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .hero {
      height: 100vh;
      background: url('assets/hero.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero h1 {
      font-size: 48px;
    }

    .section {
      padding: 80px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      transition: transform 0.5s;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid black;
      margin-top: 20px;
      text-decoration: none;
      color: black;
    }

    footer {
      text-align: center;
      padding: 40px;
      background: #111;
      color: white;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
    }

  </style>
</head>
<body>

<header>
  <h1>Kiah's Interiors</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Transform your space from vision to vibe</h1>
    <p>Luxury Interior Design Studio - Thane | Mumbai | Navi Mumbai</p>
  </div>
</section>

<section class="section" id="about">
  <h2>About Us</h2>
  <p>We create premium, modern and functional interiors that reflect your lifestyle.</p>
</section>

<section class="section" id="projects">
  <h2>Projects</h2>
  <div class="grid">
    <div class="card"><img src="assets/project1.jpg" /></div>
    <div class="card"><img src="assets/project2.jpg" /></div>
    <div class="card"><img src="assets/project3.jpg" /></div>
  </div>
</section>

<section class="section" id="contact">
  <h2>Contact</h2>
  <form>
    <input type="text" placeholder="Name" required /><br><br>
    <input type="email" placeholder="Email" required /><br><br>
    <textarea placeholder="Message"></textarea><br><br>
    <button class="btn">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 Kiah's Interiors</p>
</footer>

<a href="https://wa.me/919999999999" class="whatsapp">W</a>

</body>
</html>
